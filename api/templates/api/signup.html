{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Design by foolishdeveloper.com -->
    <title>Signup Page</title>
 
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <!--Stylesheet-->
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style media="screen">
    
    </style>
</head>
<body>
    {% comment %} <img src="{% static 'img/1.jpg' %}" alt=""> {% endcomment %}
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <form method="post">
        {% csrf_token %} 
        <h3>Signup Here</h3>

        <label for="username" class="form-group mb-3">Username</label>
        <input type="text" placeholder="Username" class='form-control' name="username" id="username">

        <label for="email">Email</label>
        <input type="email"  class='form-control'placeholder="Email or Phone" name="email" id="email">
        
        <label for="password1">Password</label>
        <input type="password" class='form-control' placeholder="Password" id="password" name="password">


        <label for="password2">Confirm Password</label>
        <input type="password" class='form-control' placeholder="Confirm Password" id="password1" name="password1">
        <button type="submit">Signup</button>
        
        <a href="{% url 'login' %}" >i have already account</a>
    </form>
</body>
</html>
